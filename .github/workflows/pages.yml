name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Pages can't serve a private repo on a free plan; skip cleanly while private,
    # and this auto-activates the moment the repo is made public.
    if: ${{ github.event.repository.private == false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true # turn Pages on automatically (no manual Settings step)
      # Publish the repo root so /web/ can import ../lib/ and fetch ./curves.json.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
