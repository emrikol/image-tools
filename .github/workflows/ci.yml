name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run lint

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install encoders (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y webp libavif-bin imagemagick

      - name: Install encoders (macOS)
        if: runner.os == 'macOS'
        run: brew install webp libavif imagemagick

      - name: Tool / encoder versions (provenance)
        run: |
          node --version
          node calibration/check-encoders.mjs

      - name: Run tests
        run: npm test
